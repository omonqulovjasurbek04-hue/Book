server {
    listen ${PORT};
    listen [::]:${PORT};
    server_name _;
    root /var/www/public;
    
    # Asosiy index uchun React va Laravel fayllari
    index index.html index.php;
    charset utf-8;

    # Tezlating: Fayllarni avtomatik siqish
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json text/javascript application/javascript application/xml;

    # 1. Frontend SPA React qismi
    # Barcha kirishlar React tomon yo'naladi, topilmasa index.html ni ochadi.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 2. Backend Laravel qismi (/api ga kelgan hamma sorovlar)
    location /api {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Agar ilovada yana boshqa Laravel sahifalari bo'lsa (masalan admin panel)
    location /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP fayllar bajarilishi uchun qoida
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Statik kesh uchun qo'shimcha optimizatsiyalar
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg|mp4)$ {
        expires 6M;
        access_log off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
